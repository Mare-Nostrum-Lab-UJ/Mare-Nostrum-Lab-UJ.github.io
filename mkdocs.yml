site_name: Mare Nostrum LAB
theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Light mode

nav:
  - About Project: index.md
  - Arches Plugins:
    - Quick Start: arches-plugins/quickstart.md
  - Mare Nostrum Thesaurus:
    - Quick Start: mare-nostrum-thesaurus/quickstart.md
    - Account Management: mare-nostrum-thesaurus/account-management.md
    - Creating a New Record in the Thesaurus - Cradle: mare-nostrum-thesaurus/cradle.md
    - Mare Nostrum Thesaurus - Management: mare-nostrum-thesaurus/mare-nostrum-thesaurus-management.md
    - Appendices: mare-nostrum-thesaurus/appendices.md
  - Ontology Viewer:
    - Quick Start: ontology-viewer/quickstart.md
  - Recogito Studio:
    - Quick Start: recogito-studio/quickstart.md
    
markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences